name: Check

# Quality gates on every push and pull request (so Dependabot PRs are gated before
# auto-merge). Two jobs:
#   • check   — the OXC/TypeScript gate (oxfmt + oxlint + type-aware oxlint + tsc)
#   • phpstan — PHP static analysis (level 8, WordPress-aware) via the flake's checks.phpstan
# The release build (release.yml) is separate.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main

      # Self-contained, offline: composerDeps (WordPress/WP-CLI stubs + phpstan-wordpress)
      # come from composer.lock; the phpstan binary from nixpkgs.
      - run: nix build .#checks.x86_64-linux.phpstan -L
